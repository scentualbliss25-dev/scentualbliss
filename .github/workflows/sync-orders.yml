name: Sync orders with Wompi

# Cron cada 10 minutos. GitHub Actions cron tiene latencia variable
# (puede tardar 5-15 min extra si hay carga), pero es gratis.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:  # permite dispararlo a mano desde la UI de GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit sync endpoint
        run: |
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://scentualbliss.vercel.app/api/cron/sync-orders)
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" != "200" ]; then exit 1; fi
