name: 🚀 Deploy a Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build en GitHub Actions
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔨 Build (standalone)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_WOMPI_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_WOMPI_PUBLIC_KEY }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          WOMPI_EVENTS_SECRET: ${{ secrets.WOMPI_EVENTS_SECRET }}
          NEXT_PUBLIC_SITE_URL: https://scentualbliss.com.co
          NEXT_PUBLIC_USD_TO_COP_RATE: 4000

      - name: 📦 Empaquetar artefactos del build
        run: |
          # Copia public y .next/static dentro del standalone server
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/

          # Tarball
          tar -czf build.tar.gz -C .next/standalone .
          ls -lh build.tar.gz

      - name: 🏷️ Generar tag
        id: tag
        run: echo "tag=deploy-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 🎁 Crear Release con artefactos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Deploy ${{ steps.tag.outputs.tag }}
          files: build.tar.gz
          token: ${{ secrets.GH_PAT }}
          make_latest: 'true'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy en Hostinger

    steps:
      - name: 🔄 Descargar build y reiniciar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 5m
          script: |
            set -e
            APP_DIR=/home/u158360749/domains/scentualbliss.com.co/nodejs
            TAG="${{ needs.build.outputs.release_tag }}"

            # Cargar Node.js
            for v in 22 20 18; do
              if [ -d "/opt/alt/alt-nodejs$v/root/usr/bin" ]; then
                export PATH="/opt/alt/alt-nodejs$v/root/usr/bin:$PATH"
                break
              fi
            done

            echo "📥 Descargando build prebuilt: $TAG"
            cd /tmp
            rm -f build.tar.gz
            curl -sSL \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              -H "Accept: application/octet-stream" \
              -o build.tar.gz \
              "https://api.github.com/repos/scentualbliss25-dev/scentualbliss/releases/tags/$TAG" \
              | true

            # Si el primer método falló, usar el endpoint directo
            if [ ! -s build.tar.gz ]; then
              echo "Intentando descarga directa..."
              ASSET_URL=$(curl -s \
                -H "Authorization: token ${{ secrets.GH_PAT }}" \
                "https://api.github.com/repos/scentualbliss25-dev/scentualbliss/releases/tags/$TAG" \
                | grep '"browser_download_url".*build.tar.gz' \
                | cut -d '"' -f 4)
              echo "URL: $ASSET_URL"
              curl -sSL -o build.tar.gz "$ASSET_URL"
            fi

            ls -lh build.tar.gz

            echo "📂 Limpiando directorio de la app..."
            mkdir -p $APP_DIR
            find $APP_DIR -mindepth 1 -maxdepth 1 ! -name 'node_modules' -exec rm -rf {} + 2>/dev/null || true

            echo "📦 Extrayendo build..."
            tar -xzf build.tar.gz -C $APP_DIR
            rm /tmp/build.tar.gz
            cd $APP_DIR
            echo "Contenido:"
            ls -la

            echo "🔄 Reiniciando app..."
            if command -v pm2 &> /dev/null; then
              pm2 restart all 2>/dev/null || pm2 start server.js --name "scentualbliss"
              echo "✅ Reiniciado con PM2"
            else
              touch ~/.lsphp_restart.txt 2>/dev/null || true
              echo "ℹ️ Hostinger reinicia automáticamente"
            fi

            echo "✅ Deploy completado"

      - name: ✅ Finalizado
        run: echo "Deploy exitoso → https://scentualbliss.com.co"
