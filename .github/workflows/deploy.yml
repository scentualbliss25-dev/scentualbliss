name: 🚀 Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build y Deploy

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔨 Build producción
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_WOMPI_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_WOMPI_PUBLIC_KEY }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          WOMPI_EVENTS_SECRET: ${{ secrets.WOMPI_EVENTS_SECRET }}
          NEXT_PUBLIC_SITE_URL: https://scentualbliss.com.co
          NEXT_PUBLIC_USD_TO_COP_RATE: 4000

      - name: 🗜️ Crear zip para deploy
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "node_modules/*" \
            --exclude ".next/cache/*" \
            --exclude "*.env*" \
            --exclude "*.docx" \
            --exclude "scripts/*"
          echo "Tamaño: $(du -sh deploy.zip | cut -f1)"

      - name: 📤 Subir zip al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy.zip
          target: ~/

      - name: 🔄 Desplegar en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            APP_DIR=/home/u158360749/domains/scentualbliss.com.co/nodejs

            echo "📂 Extrayendo en $APP_DIR..."
            unzip -o ~/deploy.zip -d $APP_DIR
            rm ~/deploy.zip

            cd $APP_DIR

            echo "📦 Instalando dependencias..."
            npm ci --production=false

            echo "🔨 Build..."
            npm run build

            echo "🔄 Reiniciando app..."
            # Leer token interno de Hostinger para reiniciar
            if [ -f ~/.api_token ]; then
              API_TOKEN=$(cat ~/.api_token)
              curl -s -X POST "http://localhost/api/restart" \
                -H "Authorization: Bearer $API_TOKEN" 2>/dev/null || true
            fi

            # Intentar PM2 si existe
            if command -v pm2 &> /dev/null; then
              pm2 restart all 2>/dev/null && echo "✅ Reiniciado con PM2" || true
            fi

            echo "✅ Deploy completado en $APP_DIR"

      - name: ✅ Finalizado
        run: echo "Deploy exitoso → https://scentualbliss.com.co"
