name: 🚀 Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: 🔄 Git pull y build en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e
            APP_DIR=/home/u158360749/domains/scentualbliss.com.co/nodejs
            REPO="https://${{ secrets.GH_PAT }}@github.com/scentualbliss25-dev/scentualbliss.git"

            # === Cargar entorno Node.js de Hostinger (CloudLinux Node.js Selector) ===
            source ~/.bashrc 2>/dev/null || true

            # Buscar instalación de Node.js
            for v in 22 20 18; do
              if [ -d "/opt/alt/alt-nodejs$v/root/usr/bin" ]; then
                export PATH="/opt/alt/alt-nodejs$v/root/usr/bin:$PATH"
                echo "✅ Node.js $v cargado desde /opt/alt/alt-nodejs$v"
                break
              fi
            done

            # Verificar
            which node || { echo "❌ Node no encontrado"; exit 1; }
            which npm || { echo "❌ NPM no encontrado"; exit 1; }
            node -v
            npm -v

            echo "📂 Directorio: $APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              echo "🔄 Actualizando repo..."
              cd $APP_DIR
              git remote set-url origin $REPO
              git fetch origin main
              git reset --hard origin/main
            else
              echo "📥 Clonando repo por primera vez..."
              rm -rf $APP_DIR
              git clone $REPO $APP_DIR
              cd $APP_DIR
            fi

            echo "📦 Instalando dependencias..."
            npm ci --production=false

            echo "🔨 Build (con límite de memoria/workers)..."
            export NODE_OPTIONS='--max-old-space-size=1024'
            export NEXT_PRIVATE_WORKER=1
            npm run build

            echo "🔄 Reiniciando app..."
            if command -v pm2 &> /dev/null; then
              pm2 restart all 2>/dev/null || pm2 start npm --name "scentualbliss" -- start
              echo "✅ Reiniciado con PM2"
            else
              # Hostinger Node.js Selector: tocar el archivo restart
              touch ~/.lsphp_restart.txt 2>/dev/null || true
              echo "ℹ️ Hostinger reinicia automáticamente"
            fi

            echo "✅ Deploy completado"

      - name: ✅ Finalizado
        run: echo "Deploy exitoso → https://scentualbliss.com.co"
