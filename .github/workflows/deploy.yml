name: 🚀 Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build y Deploy

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔨 Build producción
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_WOMPI_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_WOMPI_PUBLIC_KEY }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          WOMPI_EVENTS_SECRET: ${{ secrets.WOMPI_EVENTS_SECRET }}
          NEXT_PUBLIC_SITE_URL: https://scentualbliss.com.co
          NEXT_PUBLIC_USD_TO_COP_RATE: 4000

      - name: 🗜️ Crear zip para deploy
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "node_modules/*" \
            --exclude ".next/cache/*" \
            --exclude "*.env*" \
            --exclude "*.docx" \
            --exclude "scripts/*"
          echo "Tamaño del zip: $(du -sh deploy.zip | cut -f1)"

      - name: 🔍 Explorar estructura del servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "=== Contenido de home ==="
            ls -la ~/

            echo "=== Buscando package.json ==="
            find ~ -maxdepth 5 -name "package.json" ! -path "*/node_modules/*" 2>/dev/null

            echo "=== Buscando next.config ==="
            find ~ -maxdepth 5 -name "next.config*" 2>/dev/null

            echo "=== Procesos Node activos ==="
            ps aux | grep node | grep -v grep || echo "Ninguno"

      - name: 📤 Subir zip al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy.zip
          target: ~/

      - name: 🔄 Extraer y reiniciar en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            # Directorio hardcodeado basado en diagnóstico
            APP_DIR=~/scentualbliss

            echo "Usando directorio: $APP_DIR"

            # Crear directorio si no existe
            mkdir -p $APP_DIR

            # Extraer zip
            unzip -o ~/deploy.zip -d $APP_DIR
            rm ~/deploy.zip

            cd $APP_DIR

            # Instalar dependencias
            npm ci --production=false

            # Build
            npm run build

            # Reiniciar
            if command -v pm2 &> /dev/null; then
              pm2 restart all 2>/dev/null || pm2 start npm --name "scentualbliss" -- start
              echo "Reiniciado con PM2"
            else
              echo "PM2 no disponible — Hostinger reinicia automáticamente"
            fi

            echo "✅ Deploy completado"

      - name: ✅ Finalizado
        run: echo "¡Desplegado en https://scentualbliss.com.co!"
