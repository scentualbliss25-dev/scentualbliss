name: 🚀 Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build y Deploy

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔨 Build producción
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_WOMPI_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_WOMPI_PUBLIC_KEY }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          WOMPI_EVENTS_SECRET: ${{ secrets.WOMPI_EVENTS_SECRET }}
          NEXT_PUBLIC_SITE_URL: https://scentualbliss.com.co
          NEXT_PUBLIC_USD_TO_COP_RATE: 4000

      - name: 🗜️ Crear zip para deploy
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "node_modules/*" \
            --exclude ".next/cache/*" \
            --exclude "*.env*" \
            --exclude "*.docx" \
            --exclude "scripts/*"
          echo "Tamaño del zip: $(du -sh deploy.zip | cut -f1)"

      - name: 📤 Subir zip al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy.zip
          target: ~/deploy_temp/

      - name: 🔄 Extraer y reiniciar en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            # Encontrar directorio de la app
            APP_DIR=$(find ~ -maxdepth 3 -name "package.json" \
              ! -path "*/node_modules/*" \
              ! -path "*/deploy_temp/*" \
              -exec dirname {} \; 2>/dev/null | head -1)

            echo "Directorio de la app: $APP_DIR"

            # Extraer zip en el directorio correcto
            cd $APP_DIR
            unzip -o ~/deploy_temp/deploy.zip -d $APP_DIR
            rm ~/deploy_temp/deploy.zip

            # Instalar dependencias de producción
            npm ci --production=false

            # Build (por si acaso Hostinger lo requiere)
            npm run build

            # Reiniciar app con PM2 si está disponible
            if command -v pm2 &> /dev/null; then
              pm2 restart all || pm2 start npm --name "scentualbliss" -- start
            fi

            echo "✅ Deploy completado"

      - name: ✅ Finalizado
        run: echo "¡Desplegado en https://scentualbliss.com.co!"
