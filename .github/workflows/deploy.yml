name: 🚀 Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: 🔄 Git pull y build en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.85.6.22
          port: 65002
          username: u158360749
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            APP_DIR=/home/u158360749/domains/scentualbliss.com.co/nodejs
            REPO="https://${{ secrets.GH_PAT }}@github.com/scentualbliss25-dev/scentualbliss.git"

            echo "📂 Directorio: $APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              echo "🔄 Actualizando repo..."
              cd $APP_DIR
              git remote set-url origin $REPO
              git fetch origin main
              git reset --hard origin/main
            else
              echo "📥 Clonando repo por primera vez..."
              rm -rf $APP_DIR
              git clone $REPO $APP_DIR
              cd $APP_DIR
            fi

            echo "📦 Instalando dependencias..."
            npm ci --production=false

            echo "🔨 Build..."
            npm run build

            echo "🔄 Reiniciando app..."
            if command -v pm2 &> /dev/null; then
              pm2 restart all 2>/dev/null || pm2 start npm --name "scentualbliss" -- start
              echo "✅ Reiniciado con PM2"
            else
              echo "ℹ️ Hostinger reinicia automáticamente"
            fi

            echo "✅ Deploy completado"

      - name: ✅ Finalizado
        run: echo "Deploy exitoso → https://scentualbliss.com.co"
