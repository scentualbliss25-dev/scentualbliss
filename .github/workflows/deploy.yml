name: 🚀 Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build y Deploy

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔨 Build producción
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_WOMPI_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_WOMPI_PUBLIC_KEY }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          WOMPI_EVENTS_SECRET: ${{ secrets.WOMPI_EVENTS_SECRET }}
          NEXT_PUBLIC_SITE_URL: https://scentualbliss.com.co
          NEXT_PUBLIC_USD_TO_COP_RATE: 4000

      - name: 🗜️ Crear zip para deploy
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "node_modules/*" \
            --exclude ".next/cache/*" \
            --exclude "*.env*" \
            --exclude "*.docx" \
            --exclude "scripts/*"
          echo "Tamaño del zip: $(du -sh deploy.zip | cut -f1)"

      - name: 🚀 Subir y desplegar en Hostinger
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -F "file=@deploy.zip" \
            "https://developers.hostinger.com/api/hosting/v1/websites/scentualbliss.com.co/deployments" \
            -w "\nHTTP_STATUS:%{http_code}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "Respuesta: $BODY"
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "❌ Error en el deploy: HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Deploy enviado correctamente"

      - name: ✅ Deploy completado
        run: echo "¡Desplegado en https://scentualbliss.com.co!"
